<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 منع الكاش -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<title>Smart Call Intelligence</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}

/* TOP BAR */
.topbar{text-align:center;background:#111827;padding:10px}

/* HERO */
.hero{text-align:center;padding:100px;background:linear-gradient(135deg,#2563eb,#1e40af)}

.btn{padding:12px 25px;border-radius:10px;text-decoration:none;margin:5px;display:inline-block}
.green{background:#25D366;color:white}
.blue{background:#3b82f6;color:white}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}

/* CARD */
.card{background:#111827;padding:20px;border-radius:15px;text-align:center;border:1px solid #1f2937}
.best{border:2px solid #25D366}

/* PRICE */
.price{color:#25D366;font-size:24px}

/* POPUP */
#popup{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}
.popup-box{
background:#111827;padding:30px;border-radius:15px;text-align:center;
}

/* NOTIFY */
#notify{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
padding:15px;
border-radius:10px;
display:none;
}

/* REVIEWS */
.review{background:#111827;padding:15px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<div class="topbar">
👀 <span id="viewers">12</span> | 🔥 <span id="orders">5</span> طلب اليوم
</div>

<div class="hero">
<h1>📞 حوّل كل مكالمة إلى فلوس</h1>
<a class="btn green" id="heroBtn">ابدأ الآن</a>
</div>

<section style="padding:40px">
<h2>💰 الأسعار</h2>
<div class="grid" id="pricingBox"></div>

<h3>⚠️ متاح فقط <span id="slots">3</span> أماكن</h3>
</section>

<section style="padding:40px">
<h2>⭐ آراء العملاء</h2>

<div class="review">🔥 النظام زود مبيعاتي 40%</div>
<div class="review">💰 أفضل استثمار عملته</div>
<div class="review">🚀 سهل وسريع وفعّال</div>

</section>

<div id="notify"></div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2>🔥 عرض خاص لأول زيارة</h2>
<p>خصم خاص لو بدأت الآن</p>
<button onclick="closePopup()">ابدأ الآن</button>
</div>
</div>

<script>

// COUNTRY
render("INTL");
fetch("https://ipapi.co/json/")
.then(r=>r.json())
.then(d=>render(d.country))
.catch(()=>{});

function render(c){

let box=document.getElementById("pricingBox");

if(c==="EG"){
box.innerHTML=`
<div class="card">
<h3>اشتراك</h3>
<div class="price">1200 جنيه</div>
<a class="buy" data-plan="اشتراك">اشترى الآن <span class="count">10</span></a>
</div>

<div class="card best">
<h3>Lifetime</h3>
<div class="price">35,000 جنيه</div>
<a class="buy" data-plan="Lifetime">اشترى الآن <span class="count">10</span></a>
</div>
`;
setLinks("201096824653");

}else{
box.innerHTML=`
<div class="card">
<h3>Monthly</h3>
<div class="price">$39</div>
<a class="buy" data-plan="Monthly">Buy <span class="count">10</span></a>
</div>

<div class="card best">
<h3>Lifetime</h3>
<div class="price">$2000</div>
<a class="buy" data-plan="Lifetime">Buy <span class="count">10</span></a>
</div>
`;
setLinks("966565245950");
}

initBuyButtons();
}

// WHATSAPP
function setLinks(num){
window.phone=num;
document.getElementById("heroBtn").href="https://wa.me/"+num;
}

// BUY BUTTON
function initBuyButtons(){
document.querySelectorAll(".buy").forEach(btn=>{

let count=10;

let interval=setInterval(()=>{
count--;
btn.querySelector(".count").innerText=count;
if(count<=0)clearInterval(interval);
},1000);

btn.onclick=()=>{
let plan=btn.dataset.plan;
let msg=encodeURIComponent("عايز أشتري خطة "+plan);
window.open("https://wa.me/"+window.phone+"?text="+msg);
};
});
}

// TIMER FAKE DATA
let viewers=12;
setInterval(()=>{
viewers+=Math.floor(Math.random()*3-1);
if(viewers<5)viewers=5;
document.getElementById("viewers").innerText=viewers;
},3000);

let orders=5;
setInterval(()=>{
if(Math.random()>0.7)orders++;
document.getElementById("orders").innerText=orders;
},4000);

let slots=3;
setInterval(()=>{
if(slots>1 && Math.random()>0.8){
slots--;
document.getElementById("slots").innerText=slots;
}
},8000);

// NOTIFICATIONS
const msgs=[
"🔥 عميل اشترى الآن",
"💰 طلب جديد",
"🚀 شركة بدأت النظام",
"📞 اشتراك جديد"
];

setInterval(()=>{
let box=document.getElementById("notify");
box.innerText=msgs[Math.floor(Math.random()*msgs.length)];
box.style.display="block";
setTimeout(()=>box.style.display="none",3000);
},6000);

// POPUP FIRST VISIT
if(!localStorage.getItem("visited")){
setTimeout(()=>{
document.getElementById("popup").style.display="flex";
localStorage.setItem("visited",true);
},2000);
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
